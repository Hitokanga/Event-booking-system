<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập / Đăng ký – AuraGate</title>
  <meta name="description" content="Đăng nhập hoặc tạo tài khoản AuraGate để đặt vé sự kiện.">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body class="page-auth">

  <!-- Background orbs -->
  <div class="bg-orb bg-orb-1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-2" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-3" aria-hidden="true"></div>

  <!-- Header -->
  <header class="header">
    <div class="container header-container">
      <a href="../index.html" class="logo" aria-label="Về trang chủ AuraGate">
        <img
          src="../images/logo.svg"
          alt="AuraGate"
          class="logo-img"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='inline'"
        >
        <span class="logo-text">AuraGate</span>
      </a>
    </div>
  </header>

  <!-- Main -->
  <main class="auth-main">
    <div class="auth-card" role="main">

      <!-- Tab switcher -->
      <div class="auth-tabs" role="tablist" aria-label="Chọn đăng nhập hoặc đăng ký">
        <div class="tab-indicator" id="tab-indicator" aria-hidden="true"></div>
        <button class="auth-tab active" id="tab-login" role="tab" aria-selected="true" aria-controls="panel-login" onclick="switchTab('login')">Đăng nhập</button>
        <button class="auth-tab" id="tab-register" role="tab" aria-selected="false" aria-controls="panel-register" onclick="switchTab('register')">Đăng ký</button>
      </div>

      <!-- PANEL: Đăng nhập -->
      <section class="auth-panel active" id="panel-login" role="tabpanel" aria-labelledby="tab-login">
        <h1 class="auth-heading">Chào mừng <span class="text-gradient">trở lại!</span></h1>
        <p class="auth-sub">Đăng nhập để tiếp tục khám phá sự kiện.</p>

        <div class="social-row">
          <button class="btn-social" type="button" aria-label="Đăng nhập bằng Google">
            <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Google
          </button>
          <button class="btn-social" type="button" aria-label="Đăng nhập bằng Facebook">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2" aria-hidden="true">
              <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            </svg>
            Facebook
          </button>
        </div>

        <div class="divider" aria-hidden="true">hoặc đăng nhập bằng email</div>

        <form id="form-login" novalidate>
          <div class="form-group" id="group-login-email">
            <label class="form-label" for="login-email">Email</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              <input type="email" id="login-email" name="email" class="form-input" placeholder="Nhập email" autocomplete="email" aria-required="true" aria-describedby="login-email-error">
            </div>
            <span class="field-error" id="login-email-error" role="alert"></span>
          </div>

          <div class="form-group" id="group-login-password">
            <label class="form-label" for="login-password">Mật khẩu</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input type="password" id="login-password" name="password" class="form-input" placeholder="Nhập mật khẩu" autocomplete="current-password" aria-required="true" aria-describedby="login-password-error">
              <button type="button" class="btn-eye" aria-label="Hiện/ẩn mật khẩu" onclick="togglePassword('login-password', this)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="field-error" id="login-password-error" role="alert"></span>
          </div>

          <div class="form-extras">
            <label class="checkbox-label">
              <input type="checkbox" name="remember" id="remember-me">
              Ghi nhớ đăng nhập
            </label>
            <a href="#" class="link-forgot">Quên mật khẩu?</a>
          </div>

          <button type="submit" class="btn-submit">Đăng nhập</button>
        </form>

        <div class="switch-row">
          Chưa có tài khoản?
          <button onclick="switchTab('register')" aria-label="Chuyển sang trang đăng ký">Đăng ký ngay</button>
        </div>
      </section>

      <!-- PANEL: Đăng ký -->
      <section class="auth-panel" id="panel-register" role="tabpanel" aria-labelledby="tab-register">
        <h1 class="auth-heading">Tạo tài khoản <span class="text-gradient">mới</span></h1>
        <p class="auth-sub">Tham gia AuraGate và khám phá hàng nghìn sự kiện.</p>

        <div class="social-row">
          <button class="btn-social" type="button" aria-label="Đăng ký bằng Google">
            <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Google
          </button>
          <button class="btn-social" type="button" aria-label="Đăng ký bằng Facebook">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2" aria-hidden="true">
              <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            </svg>
            Facebook
          </button>
        </div>

        <div class="divider" aria-hidden="true">hoặc đăng ký bằng email</div>

        <form id="form-register" novalidate>
          <div class="form-group" id="group-reg-name">
            <label class="form-label" for="reg-name">Họ và tên</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <input type="text" id="reg-name" name="fullname" class="form-input" placeholder="Nguyễn Văn A" autocomplete="name" aria-required="true" aria-describedby="reg-name-error">
            </div>
            <span class="field-error" id="reg-name-error" role="alert"></span>
          </div>

          <div class="form-group" id="group-reg-email">
            <label class="form-label" for="reg-email">Email</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              <input type="email" id="reg-email" name="email" class="form-input" placeholder="Nhập email" autocomplete="email" aria-required="true" aria-describedby="reg-email-error">
            </div>
            <span class="field-error" id="reg-email-error" role="alert"></span>
          </div>

          <div class="form-group" id="group-reg-password">
            <label class="form-label" for="reg-password">Mật khẩu</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input type="password" id="reg-password" name="password" class="form-input" placeholder="Tối thiểu 8 ký tự" autocomplete="new-password" aria-required="true" aria-describedby="reg-password-error">
              <button type="button" class="btn-eye" aria-label="Hiện/ẩn mật khẩu" onclick="togglePassword('reg-password', this)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="field-error" id="reg-password-error" role="alert"></span>
          </div>

          <div class="form-group" id="group-reg-confirm">
            <label class="form-label" for="reg-confirm">Xác nhận mật khẩu</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              <input type="password" id="reg-confirm" name="confirm_password" class="form-input" placeholder="Nhập lại mật khẩu" autocomplete="new-password" aria-required="true" aria-describedby="reg-confirm-error">
              <button type="button" class="btn-eye" aria-label="Hiện/ẩn xác nhận mật khẩu" onclick="togglePassword('reg-confirm', this)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="field-error" id="reg-confirm-error" role="alert"></span>
          </div>

          <div class="terms-row">
            <input type="checkbox" id="agree-terms" name="agree_terms" aria-required="true" aria-describedby="terms-error">
            <label for="agree-terms">
              Tôi đồng ý với <a href="#">Điều khoản dịch vụ</a> và <a href="#">Chính sách bảo mật</a> của AuraGate.
            </label>
          </div>
          <span class="field-error" id="terms-error" role="alert"></span>

          <button type="submit" class="btn-submit">Tạo tài khoản</button>
        </form>

        <div class="switch-row">
          Đã có tài khoản?
          <button onclick="switchTab('login')" aria-label="Chuyển sang trang đăng nhập">Đăng nhập</button>
        </div>
      </section>

    </div><!-- /.auth-card -->
  </main>

  <footer class="auth-footer">
    <p>© <span id="footer-year"></span> AuraGate. All rights reserved.</p>
  </footer>

  <script src="../js/script.js"></script>
  <script>
    document.getElementById('footer-year').textContent = new Date().getFullYear();

    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('tab-login').classList.toggle('active', isLogin);
      document.getElementById('tab-register').classList.toggle('active', !isLogin);
      document.getElementById('tab-login').setAttribute('aria-selected', isLogin);
      document.getElementById('tab-register').setAttribute('aria-selected', !isLogin);
      document.getElementById('tab-indicator').classList.toggle('on-register', !isLogin);
      document.getElementById('panel-login').classList.toggle('active', isLogin);
      document.getElementById('panel-register').classList.toggle('active', !isLogin);
      const heading = document.getElementById(isLogin ? 'panel-login' : 'panel-register').querySelector('.auth-heading');
      heading.setAttribute('tabindex', '-1');
      heading.focus();
    }

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      btn.setAttribute('aria-label', isHidden ? 'Ẩn mật khẩu' : 'Hiện mật khẩu');
      btn.querySelector('svg').innerHTML = isHidden
        ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    }

    function setError(groupId, errorId, msg) {
      document.getElementById(groupId).classList.add('has-error');
      const el = document.getElementById(errorId);
      el.textContent = msg; el.style.display = 'block';
    }
    function clearError(groupId, errorId) {
      document.getElementById(groupId).classList.remove('has-error');
      const el = document.getElementById(errorId);
      el.textContent = ''; el.style.display = 'none';
    }
    function isValidEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }

    document.getElementById('form-login').addEventListener('submit', function(e) {
      e.preventDefault();
      let valid = true;
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      if (!email) { setError('group-login-email','login-email-error','Vui lòng nhập email.'); valid=false; }
      else if (!isValidEmail(email)) { setError('group-login-email','login-email-error','Email không hợp lệ.'); valid=false; }
      else { clearError('group-login-email','login-email-error'); }
      if (!password) { setError('group-login-password','login-password-error','Vui lòng nhập mật khẩu.'); valid=false; }
      else { clearError('group-login-password','login-password-error'); }
      if (!valid) return;
      const users = JSON.parse(localStorage.getItem('ag_users') || '[]');
      const user = users.find(u => u.email === email && u.password === password);
      if (!user) { setError('group-login-password','login-password-error','Email hoặc mật khẩu không đúng.'); return; }
      localStorage.setItem('ag_current_user', JSON.stringify({ name: user.name, email: user.email }));
      window.location.href = '../index.html';
    });

    document.getElementById('form-register').addEventListener('submit', function(e) {
      e.preventDefault();
      let valid = true;
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const confirm = document.getElementById('reg-confirm').value;
      const agreed = document.getElementById('agree-terms').checked;
      if (!name || name.length < 2) { setError('group-reg-name','reg-name-error', !name ? 'Vui lòng nhập họ và tên.' : 'Họ tên tối thiểu 2 ký tự.'); valid=false; }
      else { clearError('group-reg-name','reg-name-error'); }
      if (!email) { setError('group-reg-email','reg-email-error','Vui lòng nhập email.'); valid=false; }
      else if (!isValidEmail(email)) { setError('group-reg-email','reg-email-error','Email không hợp lệ.'); valid=false; }
      else { clearError('group-reg-email','reg-email-error'); }
      if (!password) { setError('group-reg-password','reg-password-error','Vui lòng nhập mật khẩu.'); valid=false; }
      else if (password.length < 8) { setError('group-reg-password','reg-password-error','Mật khẩu tối thiểu 8 ký tự.'); valid=false; }
      else { clearError('group-reg-password','reg-password-error'); }
      if (!confirm) { setError('group-reg-confirm','reg-confirm-error','Vui lòng xác nhận mật khẩu.'); valid=false; }
      else if (confirm !== password) { setError('group-reg-confirm','reg-confirm-error','Mật khẩu xác nhận không khớp.'); valid=false; }
      else { clearError('group-reg-confirm','reg-confirm-error'); }
      const termsError = document.getElementById('terms-error');
      if (!agreed) { termsError.textContent='Vui lòng đồng ý với điều khoản để tiếp tục.'; termsError.style.display='block'; valid=false; }
      else { termsError.textContent=''; termsError.style.display='none'; }
      if (!valid) return;
      const users = JSON.parse(localStorage.getItem('ag_users') || '[]');
      if (users.find(u => u.email === email)) { setError('group-reg-email','reg-email-error','Email này đã được đăng ký.'); return; }
      users.push({ name, email, password });
      localStorage.setItem('ag_users', JSON.stringify(users));
      localStorage.setItem('ag_current_user', JSON.stringify({ name, email }));
      window.location.href = '../index.html';
    });

    [
      ['login-email','group-login-email','login-email-error'],
      ['login-password','group-login-password','login-password-error'],
      ['reg-name','group-reg-name','reg-name-error'],
      ['reg-email','group-reg-email','reg-email-error'],
      ['reg-password','group-reg-password','reg-password-error'],
      ['reg-confirm','group-reg-confirm','reg-confirm-error'],
    ].forEach(([id,g,e]) => document.getElementById(id).addEventListener('input', () => clearError(g,e)));
  </script>
</body>
</html>
